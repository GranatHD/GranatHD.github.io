<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,
    initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" charset="utf-8" defer></script>
  </head>
  <body>
    <div class="calculator-grid">
      <div class="output">
        <div data-previous-operand class="previous-operand"></div>
        <div data-current-operand class="current-operand"></div>
      </div>
      <button data-all-clear class="span-two">All Clear</button>
      <button data-clear>Clear</button>
      <button data-operation>square</button>
      <button data-operation>cube</button>
      <button data-operation>Cos</button>
      <button data-operation>Sin</button>
      <button data-operation>Tan</button>
      <button data-operation>Cosh</button>
      <button data-operation>Sinh</button>
      <button data-operation>Tanh</button>
      <button data-operation>Acos</button>
      <button data-operation>Asin</button>
      <button data-operation>Atan</button>
      <button data-operation>Atan2</button>
      <button data-operation>Pow</button>
      <button data-operation>Ln</button>
      <button data-operation>Log</button>
      <button data-operation>/</button>
      <button data-operation>*</button>
      <button data-number>1</button>
      <button data-number>2</button>
      <button data-number>3</button>
      <button data-operation>+</button>
      <button data-number>4</button>
      <button data-number>5</button>
      <button data-number>6</button>
      <button data-operation>-</button>
      <button data-number>7</button>
      <button data-number>8</button>
      <button data-number>9</button>
      <button data-number>.</button>
      <button data-operation>%</button>
      <button data-number>0</button>
      <button data-equals class="span-two">=</button>

    </div>
  </body>
</html>
